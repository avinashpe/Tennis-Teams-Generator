<!DOCTYPE html>
<html>
<head>
    <title>Tennis Doubles Team Generator</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

    <h1>Tennis Doubles</h1>
    <h1>Team</h1>
    <h1>Generator</h1>
    <p>Enter player names below, separated by commas</p>

    <div class="tabs">
    <button id="normalBtn" class="tab-button active" onclick="showTab('normal')">Doubles</button>
    <button id="mixedBtn" class="tab-button" onclick="showTab('mixed')">Mixed Doubles</button>
    </div>

    <hr>

    <div id="normalSection">
        <h3>Normal Doubles</h3>
        <p>Enter all players together:</p>
        <input type="text" id="playerInput" placeholder="player1, player2, player3, player4">
        <button onclick="makeTeams()">Generate Teams!</button>
    </div>

    <div id="mixedSection" style="display:none;">
        <h3>Mixed A-Grade & B-Grade</h3>
        <p>Enter A-Grade Players:</p>
        <input type="text" id="gradeAInput" placeholder="Pro 1, Pro 2, Pro 3...">
        <br><br>
        <p>Enter B-Grade Players:</p>
        <input type="text" id="gradeBInput" placeholder="Rookie 1, Rookie 2, Rookie 3...">
        <br><br>
        <button onclick="makeMixedTeams()">Generate Mixed Teams!</button>
    </div>

    <div id="teamResults"></div>

    <script src="script.js"></script>

</body>
</html>
